name: Build Mobile Apps (Flet)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite rodar manualmente a qualquer momento na aba "Actions"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java (Android SDK requer Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet httpx cachetools pybreaker

      - name: Build Android APK
        run: flet build apk ./app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CEP_API_Pro_Android_APK
          path: build/apk/**/*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet httpx cachetools pybreaker

      - name: Build iOS IPA
        # Este comando criará o arquivo .ipa nativo do iOS.
        run: flet build ipa ./app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CEP_API_Pro_iOS_IPA
          path: build/ipa/**/*.ipa
